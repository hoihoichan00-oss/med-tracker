<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥物追蹤器</title>
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="食藥提醒">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang HK',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;padding-bottom:40px;}
.header{background:linear-gradient(135deg,#7c3aed,#a855f7);padding:32px 20px 20px;text-align:center;}
.header h1{font-size:22px;font-weight:800;margin-top:6px;}
.header p{color:#e9d5ff;font-size:12px;margin-top:4px;}
.container{max-width:420px;margin:0 auto;padding:0 16px;}
.card{background:#1f2937;border-radius:20px;padding:20px;margin-top:14px;}
.status-card{text-align:center;border:1.5px solid transparent;}
.status-text{font-size:20px;font-weight:800;margin:10px 0;}
.date-text{font-size:12px;color:#6b7280;}
.btn-main{width:100%;border:none;border-radius:14px;padding:16px 0;font-size:18px;font-weight:800;cursor:pointer;color:#fff;margin-top:16px;background:linear-gradient(135deg,#7c3aed,#a855f7);transition:transform 0.15s;}
.btn-main:active{transform:scale(0.95);}
.btn-main2{width:100%;border:none;border-radius:14px;padding:16px 0;font-size:18px;font-weight:800;cursor:pointer;color:#fff;margin-top:12px;background:linear-gradient(135deg,#db2777,#f472b6);transition:transform 0.15s;}
.btn-main2:active{transform:scale(0.95);}
.btn-secondary{background:none;border:1px solid #374151;border-radius:8px;padding:5px 14px;font-size:12px;color:#6b7280;cursor:pointer;margin-top:8px;}
.btn-grey{width:100%;background:#1f2937;color:#6b7280;border:1px solid #374151;border-radius:14px;padding:12px 0;font-size:14px;cursor:pointer;margin-top:12px;}
.stats{display:flex;gap:12px;margin-top:14px;}
.stat-box{flex:1;background:#1f2937;border-radius:16px;padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;color:#a78bfa;}
.stat-num2{font-size:28px;font-weight:800;color:#f472b6;}
.stat-label{font-size:10px;color:#6b7280;margin-top:2px;}
.calendar-scroll{overflow-x:auto;}
.calendar-row{display:flex;gap:5px;min-width:max-content;padding:4px 0;}
.cal-day{border-radius:10px;padding:7px 3px;text-align:center;min-width:42px;border:2px solid transparent;}
.cal-day.today{border-color:#a78bfa;}
.cal-day.today2{border-color:#f472b6;}
.cal-wd{font-size:9px;color:#6b7280;}
.cal-date{font-size:11px;color:#9ca3af;}
.cal-icon{font-size:13px;}
.cal-today-label{font-size:8px;color:#a78bfa;font-weight:700;}
.legend{display:flex;gap:10px;margin-top:10px;font-size:11px;color:#4b5563;flex-wrap:wrap;}
.card-title{font-weight:700;font-size:13px;color:#9ca3af;margin-bottom:10px;}
.tab-row{display:flex;gap:8px;margin-top:14px;}
.tab{flex:1;padding:10px 0;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.tab.active-purple{background:#7c3aed;color:#fff;}
.tab.active-pink{background:#db2777;color:#fff;}
.tab.inactive{background:#1f2937;color:#6b7280;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:600;border:1px solid #374151;z-index:200;white-space:nowrap;opacity:0;transition:opacity 0.3s;}
.toast.show{opacity:1;}
#setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;}
#setup-screen h1{font-size:24px;font-weight:800;text-align:center;margin:12px 0 6px;}
#setup-screen p{color:#6b7280;font-size:14px;text-align:center;margin-bottom:28px;}
.form-group{width:100%;max-width:360px;}
.form-label{display:block;font-size:13px;font-weight:700;margin-bottom:8px;}
.form-input{width:100%;padding:14px;border-radius:12px;border:1.5px solid #374151;background:#1f2937;color:#fff;font-size:16px;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:800;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid #374151;}
</style>
</head>
<body>
<div id="setup-screen">
  <div style="font-size:56px">💊</div>
  <h1>藥物追蹤器</h1>
  <p>甲亢藥 + 避孕藥提示</p>
  <div class="form-group">
    <div class="section-title" style="color:#a78bfa">💊 甲亢藥（隔日）</div>
    <label class="form-label" style="color:#a78bfa">第一次食藥日期</label>
    <input type="date" id="thyroid-start" class="form-input">
    <div class="section-title" style="color:#f472b6">💊 避孕藥（每日）</div>
    <label class="form-label" style="color:#f472b6">開始追蹤日期</label>
    <input type="date" id="pill-start" class="form-input">
    <button class="btn-main" onclick="saveSetup()">開始使用 →</button>
  </div>
</div>

<div id="main-screen" style="display:none">
  <div class="header">
    <div style="font-size:34px">💊</div>
    <h1>藥物追蹤器</h1>
    <p>甲亢藥 · 避孕藥</p>
  </div>
  <div class="container">
    <div class="tab-row">
      <button class="tab active-purple" id="tab1" onclick="switchTab(1)">💊 甲亢藥</button>
      <button class="tab inactive" id="tab2" onclick="switchTab(2)">💊 避孕藥</button>
    </div>

    <!-- Thyroid Tab -->
    <div id="panel1">
      <div class="card status-card" id="t-status-card">
        <div class="date-text" id="t-today-date"></div>
        <div class="status-text" id="t-status-text"></div>
        <div id="t-action-area"></div>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-num" id="t-streak">0</div><div class="stat-label">連續準時食藥</div></div>
        <div class="stat-box"><div class="stat-num" id="t-total">0</div><div class="stat-label">總共食咗次數</div></div>
      </div>
      <div class="card">
        <div class="card-title">📅 最近三週記錄</div>
        <div class="calendar-scroll"><div class="calendar-row" id="t-calendar"></div></div>
        <div class="legend"><span>✓ 食咗</span><span>✗ 漏食</span><span>💊 食藥日</span><span>— 休息日</span></div>
      </div>
    </div>

    <!-- Pill Tab -->
    <div id="panel2" style="display:none">
      <div class="card status-card" id="p-status-card">
        <div class="date-text" id="p-today-date"></div>
        <div class="status-text" id="p-status-text"></div>
        <div id="p-action-area"></div>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-num2" id="p-streak">0</div><div class="stat-label">連續準時食藥</div></div>
        <div class="stat-box"><div class="stat-num2" id="p-total">0</div><div class="stat-label">總共食咗次數</div></div>
      </div>
      <div class="card">
        <div class="card-title">📅 最近三週記錄</div>
        <div class="calendar-scroll"><div class="calendar-row" id="p-calendar"></div></div>
        <div class="legend"><span>✓ 食咗</span><span>✗ 漏食</span><span>💊 今日</span></div>
      </div>
    </div>

    <button class="btn-grey" onclick="showSetup()">⚙️ 更改設定</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const DAYS=['日','一','二','三','四','五','六'];
function toDateStr(d){return d.toISOString().split('T')[0];}
function today(){return toDateStr(new Date());}
function isMedDay(s,c){return Math.floor((new Date(c)-new Date(s))/86400000)%2===0;}
function load(){try{return JSON.parse(localStorage.getItem('med_pwa2')||'null');}catch{return null;}}
function save(d){try{localStorage.setItem('med_pwa2',JSON.stringify(d));return true;}catch{return false;}}
let appData=load();
let currentTab=1;

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function switchTab(n){
  currentTab=n;
  document.getElementById('panel1').style.display=n===1?'block':'none';
  document.getElementById('panel2').style.display=n===2?'block':'none';
  document.getElementById('tab1').className='tab '+(n===1?'active-purple':'inactive');
  document.getElementById('tab2').className='tab '+(n===2?'active-pink':'inactive');
}

function saveSetup(){
  const ts=document.getElementById('thyroid-start').value;
  const ps=document.getElementById('pill-start').value;
  if(!ts||!ps){showToast('請填晒所有日期！');return;}
  const existing=appData||{};
  appData={thyroidStart:ts,pillStart:ps,thyroidTaken:existing.thyroidTaken||[],pillTaken:existing.pillTaken||[]};
  save(appData);
  showMain();
  showToast('✅ 設定已儲存！');
}

function showSetup(){
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('main-screen').style.display='none';
  if(appData){
    document.getElementById('thyroid-start').value=appData.thyroidStart;
    document.getElementById('pill-start').value=appData.pillStart;
  } else {
    document.getElementById('thyroid-start').value=today();
    document.getElementById('pill-start').value=today();
  }
}

function showMain(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  renderThyroid();
  renderPill();
}

function renderThyroid(){
  if(!appData)return;
  const t=today();
  const medDay=isMedDay(appData.thyroidStart,t);
  const taken=appData.thyroidTaken.includes(t);
  document.getElementById('t-today-date').textContent=new Date().toLocaleDateString('zh-HK',{weekday:'long',month:'long',day:'numeric'});
  const card=document.getElementById('t-status-card');
  const statusEl=document.getElementById('t-status-text');
  const actionEl=document.getElementById('t-action-area');
  if(!medDay){
    card.style.background='#1a1040';card.style.borderColor='#a78bfa33';
    statusEl.style.color='#a78bfa';statusEl.textContent='💤 今日唔使食';
    let next=null;for(let i=1;i<=3;i++){const d=new Date();d.setDate(d.getDate()+i);if(isMedDay(appData.thyroidStart,toDateStr(d))){next=toDateStr(d);break;}}
    actionEl.innerHTML=next?`<div style="color:#6b7280;font-size:13px;margin-top:10px">下次食藥：<span style="color:#a78bfa;font-weight:700">${next}</span></div>`:'';
  } else if(taken){
    card.style.background='#0d3b2e';card.style.borderColor='#34d39933';
    statusEl.style.color='#34d399';statusEl.textContent='✅ 今日食咗喇';
    actionEl.innerHTML=`<div style="font-size:32px;margin-top:8px">🎉</div><button class="btn-secondary" onclick="untakeThyroid()">取消記錄</button>`;
  } else {
    card.style.background='#3b2400';card.style.borderColor='#fbbf2433';
    statusEl.style.color='#fbbf24';statusEl.textContent='⏰ 今日要食甲亢藥！';
    actionEl.innerHTML=`<button class="btn-main" onclick="takeThyroid()">✅ 我食咗喇！</button>`;
  }
  document.getElementById('t-total').textContent=appData.thyroidTaken.length;
  document.getElementById('t-streak').textContent=calcStreak(appData.thyroidStart,appData.thyroidTaken,true);
  renderCalendar('t-calendar',appData.thyroidStart,appData.thyroidTaken,true);
}

function renderPill(){
  if(!appData)return;
  const t=today();
  const taken=appData.pillTaken.includes(t);
  document.getElementById('p-today-date').textContent=new Date().toLocaleDateString('zh-HK',{weekday:'long',month:'long',day:'numeric'});
  const card=document.getElementById('p-status-card');
  const statusEl=document.getElementById('p-status-text');
  const actionEl=document.getElementById('p-action-area');
  if(taken){
    card.style.background='#3b0a2a';card.style.borderColor='#f472b633';
    statusEl.style.color='#f472b6';statusEl.textContent='✅ 今日食咗喇';
    actionEl.innerHTML=`<div style="font-size:32px;margin-top:8px">🎉</div><button class="btn-secondary" onclick="untakePill()">取消記錄</button>`;
  } else {
    card.style.background='#3b1a00';card.style.borderColor='#fb923c33';
    statusEl.style.color='#fb923c';statusEl.textContent='⏰ 今日要食避孕藥！';
    actionEl.innerHTML=`<button class="btn-main2" onclick="takePill()">✅ 我食咗喇！</button>`;
  }
  document.getElementById('p-total').textContent=appData.pillTaken.length;
  document.getElementById('p-streak').textContent=calcStreak(appData.pillStart,appData.pillTaken,false);
  renderCalendar('p-calendar',appData.pillStart,appData.pillTaken,false);
}

function takeThyroid(){if(appData.thyroidTaken.includes(today()))return;appData.thyroidTaken.push(today());save(appData);showToast('🎉 甲亢藥記錄！');renderThyroid();}
function untakeThyroid(){appData.thyroidTaken=appData.thyroidTaken.filter(d=>d!==today());save(appData);showToast('已取消');renderThyroid();}
function takePill(){if(appData.pillTaken.includes(today()))return;appData.pillTaken.push(today());save(appData);showToast('🎉 避孕藥記錄！');renderPill();}
function untakePill(){appData.pillTaken=appData.pillTaken.filter(d=>d!==today());save(appData);showToast('已取消');renderPill();}

function calcStreak(startDate,takenDates,isAlt){
  let count=0;let d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<60;i++){
    const ds=toDateStr(d);
    if(isAlt&&!isMedDay(startDate,ds)){d.setDate(d.getDate()-1);continue;}
    if(!takenDates.includes(ds))break;
    count++;
    d.setDate(d.getDate()-(isAlt?2:1));
  }
  return count;
}

function renderCalendar(id,startDate,takenDates,isAlt){
  const row=document.getElementById(id);row.innerHTML='';
  const base=new Date();base.setDate(base.getDate()-7);
  for(let i=0;i<21;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    const ds=toDateStr(d);
    const isToday=ds===today();
    const medDay=isAlt?isMedDay(startDate,ds):true;
    const taken=takenDates.includes(ds);
    const isPast=d<new Date(today());
    let bg='#1a1a2e',icon='';
    if(!medDay){bg='#16213e';icon='—';}
    else if(taken){bg=isAlt?'#0d3b2e':'#2d1b3d';icon='✓';}
    else if(isPast){bg='#3b0d0d';icon='✗';}
    else{bg=isAlt?'#3b3000':'#3b1a00';icon='💊';}
    const div=document.createElement('div');
    div.className='cal-day'+(isToday?(isAlt?' today':' today2'):'');
    div.style.background=bg;
    div.innerHTML=`<div class="cal-wd">(${DAYS[d.getDay()]})</div><div class="cal-date">${d.getMonth()+1}/${d.getDate()}</div><div class="cal-icon">${icon}</div>${isToday?`<div class="cal-today-label">今日</div>`:''}`;
    row.appendChild(div);
  }
}

window.addEventListener('load',()=>{
  'serviceWorker'in navigator&&navigator.serviceWorker.register('sw.js').catch(()=>{});
  if(appData){showMain();}else{showSetup();}
});
</script>
</body>
</html>
